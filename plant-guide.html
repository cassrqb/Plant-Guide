<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Study Guide — New England & Northeast</title>
<style>
  :root {
    --native: #2d7a3a;
    --invasive: #c0392b;
    --cultivated: #7d5ba6;
    --bg: #f5f3ee;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #666;
    --border: #e0ddd5;
    --accent: #3a6b35;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--accent); color: white; padding: 14px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  header h1 { font-size: 1.05rem; font-weight: 700; }
  header p { font-size: 0.72rem; opacity: 0.8; margin-top: 2px; }
  .controls { background: white; padding: 10px 14px; position: sticky; top: 60px; z-index: 99; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .search-box { display: flex; align-items: center; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 7px 11px; gap: 8px; }
  .search-box input { border: none; background: transparent; font-size: 0.92rem; width: 100%; outline: none; color: var(--text); }
  .search-box svg { flex-shrink: 0; opacity: 0.4; }
  .filter-row { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 1px; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); align-self: center; white-space: nowrap; min-width: 56px; }
  .filter-btn { white-space: nowrap; padding: 5px 11px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-size: 0.76rem; font-weight: 500; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .filter-btn.status-native.active { background: var(--native); border-color: var(--native); }
  .filter-btn.status-invasive.active { background: var(--invasive); border-color: var(--invasive); }
  .filter-btn.status-cultivated.active { background: var(--cultivated); border-color: var(--cultivated); }
  .count-bar { padding: 7px 14px; font-size: 0.76rem; color: var(--muted); }
  .grid { padding: 0 10px 28px; display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; }
  @media (max-width: 380px) { .grid { grid-template-columns: 1fr 1fr; } }
  .card { background: var(--card); border-radius: 13px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s; display: flex; flex-direction: column; }
  .card:active { transform: scale(0.97); }
  .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #e8e4dc; display: block; }
  .card-img-placeholder { width: 100%; aspect-ratio: 1; background: linear-gradient(135deg, #d4edda, #a8d5b5); display: none; align-items: center; justify-content: center; font-size: 2.4rem; }
  .card-body { padding: 9px; flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .card-common { font-size: 0.83rem; font-weight: 600; line-height: 1.2; }
  .card-scientific { font-size: 0.7rem; font-style: italic; color: var(--muted); }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
  .status-badge { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 0.62rem; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; align-self: flex-start; }
  .badge-native { background: #d4edda; color: var(--native); }
  .badge-invasive { background: #fde8e8; color: var(--invasive); }
  .badge-cultivated { background: #ede8f5; color: var(--cultivated); }
  .region-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-southshore { background: #3a6b35; }
  .dot-massachusetts { background: #1a5276; }
  .dot-northeast { background: #784212; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; padding: 20px 12px; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 20px 20px 14px 14px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch; animation: slideUp 0.22s ease-out; }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 20px 20px 0 0; background: #e8e4dc; display: block; }
  .modal-img-placeholder { width: 100%; aspect-ratio: 4/3; background: linear-gradient(135deg, #d4edda, #a8d5b5); display: none; align-items: center; justify-content: center; font-size: 5rem; border-radius: 20px 20px 0 0; }
  .modal-body { padding: 18px; }
  .modal-common { font-size: 1.25rem; font-weight: 700; line-height: 1.2; }
  .modal-also { font-size: 0.8rem; color: var(--muted); margin-top: 3px; }
  .modal-scientific { font-size: 0.92rem; font-style: italic; color: #555; margin-top: 5px; }
  .modal-divider { height: 1px; background: var(--border); margin: 13px 0; }
  .modal-row { display: flex; gap: 8px; margin-bottom: 9px; }
  .modal-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); min-width: 78px; padding-top: 1px; }
  .modal-value { font-size: 0.86rem; line-height: 1.4; }
  .modal-description { font-size: 0.86rem; line-height: 1.65; color: #444; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .modal-close { position: absolute; top: 30px; right: 22px; background: rgba(0,0,0,0.4); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .modal-wrapper { position: relative; }
  .region-tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
  .region-tag.southshore { background: #e8f5e9; color: #2d5a27; }
  .region-tag.massachusetts { background: #e8eef5; color: #1a4a6b; }
  .region-tag.northeast { background: #fdf3e7; color: #7a4010; }
  .no-results { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: 1/-1; }

  /* Legend */
  .legend { display: flex; gap: 12px; padding: 6px 14px 2px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.68rem; color: var(--muted); }
</style>
</head>

<header>

  <p>02171 Neighborhood · Massachusetts · Northeast US</p>

<div class="controls">

<div class="count-bar" id="countBar"></div>

    <div class="modal" id="modal"></div>

</div>

  { region:"southshore", common_names:["Common Dandelion"], scientific_name:"Taraxacum officinale", plant_type:"flowering", native_range:"Europe and Asia", status_in_ma:"cultivated", description:"Familiar lawn weed with a rosette of toothed leaves, bright yellow composite flowers from spring through fall, and globe-shaped seed heads that disperse on the wind.", photo:"Taraxacum_officinale_Web.jpg", emoji:"🌼" },

  { region:"southshore", common_names:["Dame's Rocket","Dame's Violet","Sweet Rocket"], scientific_name:"Hesperis matronalis", plant_type:"flowering", native_range:"Europe and Asia", status_in_ma:"invasive", description:"Tall biennial with fragrant pink, purple, or white four-petaled flowers from May through July; naturalized along roadsides and disturbed areas, often mistaken for native wild phlox.", photo:"Sweet_Rockets.png", emoji:"💜" },
  { region:"southshore", common_names:["Common Milkweed","Silkweed"], scientific_name:"Asclepias syriaca", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", description:"Stout native perennial with large oval leaves and fragrant globular clusters of pink-purple flowers in July; the essential host plant for monarch butterfly caterpillars.", photo:"Asclepias_syriaca_2.jpg", emoji:"🦋" },
  { region:"southshore", common_names:["Canada Goldenrod","Tall Goldenrod"], scientific_name:"Solidago canadensis", plant_type:"flowering", native_range:"North America", status_in_ma:"native", description:"Common native perennial with arching plume-like clusters of tiny yellow flowers from August through October; a dominant wildflower of roadsides and old fields across the South Shore.", photo:"Solidago_canadensis_20050815_248.jpg", emoji:"🌼" },
  { region:"southshore", common_names:["New England Aster"], scientific_name:"Symphyotrichum novae-angliae", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", description:"Tall native perennial producing masses of deep purple-to-lavender daisy-like flowers with yellow centers from late August through October; a vital late-season pollinator resource.", photo:"Symphyotrichum_novae-angliae3.jpg", emoji:"💜" },
  { region:"southshore", common_names:["Orange Daylily","Tawny Daylily","Ditch Lily"], scientific_name:"Hemerocallis fulva", plant_type:"flowering", native_range:"East Asia", status_in_ma:"cultivated", description:"Vigorous clump-forming perennial with strap-like leaves and large, tawny orange six-petaled flowers in June–July; naturalized along roadsides, railroad tracks, and suburban yards throughout MA.", photo:"HemerocallisFulva1UME.jpg", emoji:"🌺" },
  { region:"southshore", common_names:["Black-eyed Susan"], scientific_name:"Rudbeckia hirta", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", description:"Native biennial or short-lived perennial with bright yellow daisy-like flowers and dark brown-black cone centers blooming June through September; common in gardens, roadsides, and sunny disturbed areas.", photo:"Rudbeckia_hirta_kz03.jpg", emoji:"🌻" },
  { region:"southshore", common_names:["Orange Jewelweed","Spotted Touch-me-not"], scientific_name:"Impatiens capensis", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", description:"Common native annual with succulent translucent stems and dangling spotted orange flowers from July through September; found in moist shade along streams and wooded edges throughout the South Shore.", photo:"Impatiens_capensis_4.jpg", emoji:"🌿" },
  { region:"southshore", common_names:["White Clover"], scientific_name:"Trifolium repens", plant_type:"flowering", native_range:"Europe and Central Asia", status_in_ma:"cultivated", description:"Low creeping perennial with three-part leaves often bearing white chevron markings and spherical white flower heads; ubiquitous in lawns, roadsides, and disturbed areas.", photo:"Trifolium_repens_-_flower.jpg", emoji:"🍀" },
  { region:"southshore", common_names:["Common Burdock","Lesser Burdock"], scientific_name:"Arctium minus", plant_type:"flowering", native_range:"Europe", status_in_ma:"cultivated", description:"Large biennial with enormous rhubarb-like basal leaves and round, hooked burrs in late summer that cling tenaciously to clothing and animal fur; common along woodland edges and disturbed areas.", photo:"Arctium_minus_in_Indiana.jpg", emoji:"🌿" },

  { region:"southshore", common_names:["Common Reed","Phragmites"], scientific_name:"Phragmites australis", plant_type:"grass", native_range:"Eurasia (invasive haplotype)", status_in_ma:"invasive", description:"Extremely tall perennial grass (up to 15 feet) with fluffy tan-brown plumes in fall; forms dense impenetrable monocultures in coastal wetlands and ditches, crowding out native marsh plants.", photo:"Phragmites_australis_Tamarac.jpg", emoji:"🌾" },

  { region:"southshore", common_names:["Marginal Wood Fern","Leather Wood Fern"], scientific_name:"Dryopteris marginalis", plant_type:"fern", native_range:"Eastern North America", status_in_ma:"native", description:"Native evergreen fern with leathery, dark green fronds that remain green through winter; one of the most common ferns on wooded suburban hillsides and woodland edges in eastern MA.", photo:"Dryopteris_marginalis0.jpg", emoji:"🌿" },
  { region:"southshore", common_names:["Cinnamon Fern"], scientific_name:"Osmundastrum cinnamomeum", plant_type:"fern", native_range:"Eastern North America and East Asia", status_in_ma:"native", description:"Large native fern with distinctive separate cinnamon-brown fertile fronds rising from the center of a vase-shaped clump of green sterile fronds; common in moist woods and wetland edges.", photo:"Osmundastrum_cinnamomeum_May2015.jpg", emoji:"🌿" },

  { region:"massachusetts", common_names:["Bearberry","Kinnikinnick","Mealberry"], scientific_name:"Arctostaphylos uva-ursi", plant_type:"groundcover", native_range:"Circumpolar northern regions", status_in_ma:"native", description:"Low mat-forming evergreen shrub with small leathery leaves, tiny pink urn-shaped flowers, and bright red berries; common in the sandy, acidic soils of Cape Cod pine barrens and coastal heathlands.", photo:"Arctostaphylos_uva-ursi_4.jpg", emoji:"🔴" },

  { region:"massachusetts", common_names:["Seaside Goldenrod","Beach Goldenrod"], scientific_name:"Solidago sempervirens", plant_type:"flowering", native_range:"Atlantic and Gulf coasts of North America", status_in_ma:"native", description:"Robust goldenrod with thick, succulent-like leaves and large arching plumes of bright yellow flowers in late summer and fall; highly visible along salt marshes, coastal dunes, and roadsides near the MA shoreline.", photo:"Solidago_sempervirens2.jpg", emoji:"🌻" },
  { region:"massachusetts", common_names:["Saltmarsh Cordgrass","Smooth Cordgrass","Spartina"], scientific_name:"Spartina alterniflora", plant_type:"grass", native_range:"Atlantic and Gulf coasts of North America", status_in_ma:"native", description:"The dominant grass of intertidal salt marshes, forming tall dense stands of bright green in summer that turn golden-brown in fall; defines the iconic tidal marsh landscapes throughout the MA coast.", photo:"Spartina_alterniflora_low_marsh.jpg", emoji:"🌾" },
  { region:"massachusetts", common_names:["Salt Marsh Hay","Salt Meadow Cordgrass"], scientific_name:"Spartina patens", plant_type:"grass", native_range:"Atlantic and Gulf coasts of North America", status_in_ma:"native", description:"Fine-textured salt marsh grass that forms characteristic swirled 'cowlick' patterns on the high marsh zone; historically harvested as hay, it carpets the upper edges of MA salt marshes in a distinctive wiry mat.", photo:"Spartina_patens.jpg", emoji:"🌾" },
  { region:"massachusetts", common_names:["Cranberry","American Cranberry","Bog Cranberry"], scientific_name:"Vaccinium macrocarpon", plant_type:"groundcover", native_range:"Eastern North America", status_in_ma:"native", description:"Low trailing evergreen vine with tiny leathery leaves, delicate pink reflexed flowers, and iconic bright red berries; native to acidic bogs across MA and famously cultivated in flooded cranberry bogs on Cape Cod and Plymouth County.", photo:"Cranberry_flowers.jpg", emoji:"🔴" },
  { region:"massachusetts", common_names:["Round-leaved Sundew","Sundew"], scientific_name:"Drosera rotundifolia", plant_type:"flowering", native_range:"Circumboreal", status_in_ma:"native", description:"Tiny carnivorous plant forming rosettes of round reddish leaves covered in sticky glistening tentacles that trap insects; found in the acidic sphagnum bogs of Cape Cod, southeastern MA, and the central highlands.", photo:"Drosera_rotundifolia1.jpg", emoji:"🌿" },
  { region:"massachusetts", common_names:["Northern Pitcher Plant","Purple Pitcher Plant"], scientific_name:"Sarracenia purpurea", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", description:"Carnivorous bog plant with distinctive hollow, pitcher-shaped leaves filled with digestive fluid that trap and dissolve insects, topped by a nodding maroon-purple flower in spring; found in sphagnum bogs from Cape Cod to the Berkshires.", photo:"Sarracenia_purpurea_ne1.jpg", emoji:"🪴" },
  { region:"massachusetts", common_names:["Sphagnum Moss","Peat Moss","Bog Moss"], scientific_name:"Sphagnum spp.", plant_type:"moss", native_range:"Circumboreal", status_in_ma:"native", description:"Soft, spongy mosses ranging in color from pale green to deep red that form the living carpet of acidic bogs; holds enormous amounts of water and creates the acidic conditions that define MA bogs and fens.", photo:"Sphagnum_palustre_plant.jpg", emoji:"🌿" },
  { region:"massachusetts", common_names:["Leatherleaf","Cassandra"], scientific_name:"Chamaedaphne calyculata", plant_type:"shrub", native_range:"Circumboreal", status_in_ma:"native", description:"Evergreen bog shrub with small leathery rusty-scaled leaves and rows of tiny white bell-shaped flowers in early spring; forms dense thickets around the margins of MA bogs and acidic ponds.", photo:"Chamaedaphne_calyculata_1.jpg", emoji:"🌿" },

  { region:"massachusetts", common_names:["Labrador Tea"], scientific_name:"Rhododendron groenlandicum", plant_type:"shrub", native_range:"Northern North America and Greenland", status_in_ma:"native", description:"Aromatic evergreen bog shrub with leathery leaves that are white-woolly beneath, bearing clusters of small white flowers in spring; found in sphagnum bogs and acidic wetlands across central and eastern MA.", photo:"Ledum_groenlandicum_3.jpg", emoji:"🌿" },
  { region:"massachusetts", common_names:["Swamp Azalea","Clammy Azalea","White Swamp Honeysuckle"], scientific_name:"Rhododendron viscosum", plant_type:"shrub", native_range:"Eastern North America", status_in_ma:"native", description:"Deciduous native azalea with intensely fragrant white to pale pink tubular flowers that bloom in midsummer after the leaves emerge; common in swamps, pond edges, and wet thickets throughout MA.", photo:"Rhododendron_viscosum_2.jpg", emoji:"🌸" },
  { region:"massachusetts", common_names:["Buttonbush","Button Willow","Honey Bells"], scientific_name:"Cephalanthus occidentalis", plant_type:"shrub", native_range:"North America", status_in_ma:"native", description:"Wetland shrub bearing distinctive spherical white flower heads resembling pincushions in midsummer, followed by spiky round brown seed balls; found along pond edges, river banks, and freshwater marshes throughout MA.", photo:"Cephalanthus_occidentalis_USDA.jpg", emoji:"⚪" },
  { region:"massachusetts", common_names:["Sensitive Fern","Bead Fern"], scientific_name:"Onoclea sensibilis", plant_type:"fern", native_range:"Eastern North America and East Asia", status_in_ma:"native", description:"Distinctive fern with broad, lobed, non-ferny-looking fronds and separate fertile fronds bearing rows of hard, bead-like spore cases that persist through winter; extremely common in wet woods, swamp edges, and ditches throughout MA.", photo:"Onoclea_sensibilis_27082003.jpg", emoji:"🌿" },
  { region:"massachusetts", common_names:["Royal Fern","Flowering Fern"], scientific_name:"Osmunda regalis", plant_type:"fern", native_range:"Cosmopolitan", status_in_ma:"native", description:"Majestic fern reaching 4–6 feet tall with broad fronds whose tips transform into golden-brown fertile segments resembling flower clusters; found in swamps, bogs, and stream banks across MA, turning rich gold in autumn.", photo:"Osmunda_regalis_2.jpg", emoji:"🌿" },

  { region:"massachusetts", common_names:["Joe-Pye Weed","Purple Boneset"], scientific_name:"Eutrochium purpureum", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", description:"Towering native wildflower reaching 5–7 feet tall with whorled leaves and large domed clusters of dusty rose-purple flowers in late summer that are magnets for butterflies; found in moist meadows and stream banks throughout MA.", photo:"Eutrochium_purpureum_2.jpg", emoji:"🦋" },
  { region:"massachusetts", common_names:["Cardinal Flower"], scientific_name:"Lobelia cardinalis", plant_type:"flowering", native_range:"North and South America", status_in_ma:"native", description:"Striking native wildflower with tall spikes of brilliant scarlet tubular flowers in midsummer, almost exclusively pollinated by ruby-throated hummingbirds; grows along stream banks, river edges, and wet meadows throughout MA.", photo:"Lobelia_cardinalis_2.jpg", emoji:"🌺" },
  { region:"massachusetts", common_names:["Swamp Rose","Marsh Rose"], scientific_name:"Rosa palustris", plant_type:"shrub", native_range:"Eastern North America", status_in_ma:"native", description:"Native rose with arching thorny canes, fragrant deep pink five-petaled flowers in midsummer, and small red hips persisting into winter; thrives in swamps, wet thickets, and pond margins across MA.", photo:"Rosa_palustris.jpg", emoji:"🌹" },
  { region:"massachusetts", common_names:["Tussock Sedge","Hassock Grass"], scientific_name:"Carex stricta", plant_type:"grass", native_range:"Eastern North America", status_in_ma:"native", description:"Native sedge that builds prominent fibrous tussocks — elevated pedestals of old stems and roots — in freshwater marshes and swamps, creating a distinctive hummock landscape characteristic of MA cattail marshes.", photo:"Carex_stricta_tussocks.jpg", emoji:"🌾" },
  { region:"massachusetts", common_names:["Yellow Pond-lily","Spadderdock","Cow Lily","Bullhead Lily"], scientific_name:"Nuphar variegata", plant_type:"flowering", native_range:"Northern North America", status_in_ma:"native", description:"Aquatic plant with large heart-shaped floating leaves and distinctive waxy yellow globular flowers on thick stalks that rise just above the water surface in summer; common on ponds, slow rivers, and lakes throughout MA.", photo:"Nuphar_variegata_1.jpg", emoji:"🌼" },

  { region:"northeast", common_names:["Pawpaw","Poor Man's Banana","Indiana Banana"], scientific_name:"Asimina triloba", plant_type:"tree", native_range:"Eastern North America", status_in_ma:"native", description:"Tropical-looking understory tree with enormous drooping leaves and dark maroon flowers, producing the largest edible fruit native to North America — a custardy, banana-mango flavored pod; common in river bottom forests of Pennsylvania, Maryland, Delaware, and the Hudson Valley.", photo:"Asimina_triloba.jpg", emoji:"🍌" },
  { region:"northeast", common_names:["Virginia Bluebells","Virginia Cowslip"], scientific_name:"Mertensia virginica", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", description:"Spectacular spring ephemeral with clusters of sky-blue trumpet-shaped flowers that form drifts of blue-purple along floodplain forests and river banks in April; abundant in Pennsylvania, Maryland, Delaware, and the Hudson Valley but largely absent from Massachusetts.", photo:"Mertensia_virginica_2.jpg", emoji:"💙" },
  { region:"northeast", common_names:["Mayapple","American Mandrake","Umbrella Plant"], scientific_name:"Podophyllum peltatum", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", description:"Colonial groundcover of rich deciduous woodlands that carpets the forest floor with paired umbrella-like leaves, hiding a single waxy white flower beneath them in May; forms extensive colonies in mid-Atlantic forests from New Jersey through Pennsylvania and Maryland.", photo:"Podophyllum_peltatum_2.jpg", emoji:"☂️" },
  { region:"northeast", common_names:["Bloodroot","Red Puccoon"], scientific_name:"Sanguinaria canadensis", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", description:"One of the earliest spring wildflowers, sending up a single white poppy-like bloom wrapped in a lobed leaf in March and April across rich mesic forests and slopes; the rhizome bleeds bright orange-red sap when cut.", photo:"Sanguinaria_canadensis_2.jpg", emoji:"🌷" },
  { region:"northeast", common_names:["Jack-in-the-Pulpit","Indian Turnip","Bog Onion"], scientific_name:"Arisaema triphyllum", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", description:"Distinctive spring wildflower with a striped green-and-purple spathe arching over a club-like spadix, found in moist shaded forests and floodplains across the Northeast; produces a striking cluster of bright red berries in late summer.", photo:"Arisaema_triphyllum_2.jpg", emoji:"🎪" },

  { region:"northeast", common_names:["Painted Trillium","Painted Lady"], scientific_name:"Trillium undulatum", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", description:"Most distinctive of the northeastern trilliums, with wavy-edged white petals marked at the base with a bold V-shaped magenta stripe, blooming in cool acidic woodlands in May; most characteristic of the boreal-influenced forests of Maine, Vermont, and the Adirondacks.", photo:"Trillium_undulatum_2.jpg", emoji:"🌺" },
  { region:"northeast", common_names:["Turk's Cap Lily"], scientific_name:"Lilium superbum", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", description:"Towering native lily reaching 8 feet tall with whorled leaves and spectacular nodding orange flowers with swept-back spotted petals in July and August; found in moist meadows, stream banks, and forest edges, particularly showy in the mid-Atlantic states.", photo:"Lilium_superbum_2.jpg", emoji:"🧡" },
  { region:"northeast", common_names:["Wild Columbine","Eastern Columbine","Rock Bells"], scientific_name:"Aquilegia canadensis", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", description:"Graceful wildflower with nodding red-and-yellow spurred flowers dangling from slender stems in April and May, growing from rocky ledges, cliff faces, and open woodlands throughout the Appalachian region; perfectly shaped for ruby-throated hummingbirds.", photo:"Aquilegia_canadensis_2.jpg", emoji:"🌹" },
  { region:"northeast", common_names:["American Chestnut","Chestnut"], scientific_name:"Castanea dentata", plant_type:"tree", native_range:"Eastern North America", status_in_ma:"native", description:"Once the dominant canopy tree of Appalachian forests from Maine to Georgia, now surviving only as stump sprouts due to the chestnut blight; long lance-shaped toothed leaves and showy white catkins in July, with young sprouts commonly encountered on Appalachian ridges in Pennsylvania and New York.", photo:"Castanea_dentata_2.jpg", emoji:"🌰" },
  { region:"northeast", common_names:["Tulip Tree","Tulip Poplar","Yellow Poplar"], scientific_name:"Liriodendron tulipifera", plant_type:"tree", native_range:"Eastern North America", status_in_ma:"native", description:"Tallest native eastern hardwood, with uniquely lobed tulip-shaped leaves that turn bright gold in fall and large greenish-yellow tulip-like flowers in May; abundant and dominant in Pennsylvania, New Jersey, Delaware, and Maryland forests but much less common in Massachusetts.", photo:"Liriodendron_tulipifera_2.jpg", emoji:"🌳" },

  { region:"northeast", common_names:["Sweetgum","American Sweetgum","Star-leaved Gum"], scientific_name:"Liquidambar styraciflua", plant_type:"tree", native_range:"Eastern North America", status_in_ma:"native", description:"Tall tree with star-shaped five-pointed leaves and distinctive spiky gumball seed pods littering the ground, turning brilliant shades of red, purple, and gold in fall; common and abundant in New Jersey, Delaware, Maryland, and the Hudson Valley lowlands but largely absent from Massachusetts.", photo:"Liquidambar_styraciflua_2.jpg", emoji:"⭐" },
  { region:"northeast", common_names:["Atlantic White Cedar","Southern White Cedar","Bog Cedar"], scientific_name:"Chamaecyparis thyoides", plant_type:"tree", native_range:"Atlantic Coastal Plain, Eastern North America", status_in_ma:"native", description:"Slender aromatic evergreen of coastal plain bogs and swamps, forming dense stands with reddish-brown fibrous bark and blue-green scale-like foliage; characteristic of the New Jersey Pine Barrens and mid-Atlantic coastal wetlands.", photo:"Chamaecyparis_thyoides_2.jpg", emoji:"🌲" },

function imgUrl(photo) {
  return `https://commons.wikimedia.org/wiki/Special:FilePath/${photo}?width=400`;
}
function badgeClass(s) { return s==="native"?"badge-native":s==="invasive"?"badge-invasive":"badge-cultivated"; }
function badgeLabel(s) { return s==="native"?"Native":s==="invasive"?"Invasive":"Cultivated"; }
function regionLabel(r) { return r==="southshore"?"02171 / South Shore":r==="massachusetts"?"Broader MA":"Northeast US"; }

let activeRegion="all", activeType="all", activeStatus="all", searchQuery="";

// Region filter is cumulative: "southshore" shows only southshore; "massachusetts" shows southshore+massachusetts; "northeast" shows all
const REGION_INCLUDES = {
  all: ["southshore","massachusetts","northeast"],
  southshore: ["southshore"],
  massachusetts: ["southshore","massachusetts"],
  northeast: ["southshore","massachusetts","northeast"]
};

function matches(p) {
  if (!REGION_INCLUDES[activeRegion].includes(p.region)) return false;
  if (activeType !== "all" && p.plant_type !== activeType) return false;
  if (activeStatus !== "all" && p.status_in_ma !== activeStatus) return false;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    if (!p.common_names.some(n=>n.toLowerCase().includes(q)) && !p.scientific_name.toLowerCase().includes(q)) return false;
  }
  return true;
}

function render() {
  const grid = document.getElementById("plantGrid");
  const filtered = PLANTS.filter(matches);
  document.getElementById("countBar").textContent = `${filtered.length} plant${filtered.length!==1?"s":""}`;
  if (!filtered.length) { grid.innerHTML=`<div class="no-results"><div style="font-size:2.5rem">🔍</div><p>No plants match your filters.</p></div>`; return; }
  grid.innerHTML = filtered.map(p => {
    const idx = PLANTS.indexOf(p);
    return `<div class="card" onclick="openModal(${idx})">
      <img class="card-img" src="${imgUrl(p.photo)}" alt="${p.common_names[0]}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="card-img-placeholder">${p.emoji}</div>
      <div class="card-body">
        <div class="card-common">${p.common_names[0]}</div>
        <div class="card-scientific">${p.scientific_name}</div>
        <div class="card-footer">
          <span class="status-badge ${badgeClass(p.status_in_ma)}">${badgeLabel(p.status_in_ma)}</span>
          <span class="region-dot dot-${p.region}" title="${regionLabel(p.region)}"></span>
        </div>
      </div>
    </div>`;
  }).join("");
}

function openModal(idx) {
  const p = PLANTS[idx];
  const modal = document.getElementById("modal");
  const altNames = p.common_names.slice(1);
  modal.innerHTML = `
    <img class="modal-img" src="${imgUrl(p.photo)}" alt="${p.common_names[0]}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="modal-img-placeholder">${p.emoji}</div>
    <div class="modal-body">
      <div class="modal-common">${p.common_names[0]}</div>
      ${altNames.length?`<div class="modal-also">Also: ${altNames.join(", ")}</div>`:""}
      <div class="modal-scientific">${p.scientific_name}</div>
      <div class="modal-divider"></div>
      <div class="modal-row"><div class="modal-label">Type</div><div class="modal-value" style="text-transform:capitalize">${p.plant_type==="flowering"?"Flowering Plant":p.plant_type}</div></div>
      <div class="modal-row"><div class="modal-label">Origin</div><div class="modal-value"><span class="status-badge ${badgeClass(p.status_in_ma)}">${badgeLabel(p.status_in_ma)}</span></div></div>
      <div class="modal-row"><div class="modal-label">Native to</div><div class="modal-value">${p.native_range}</div></div>
      <div class="modal-row"><div class="modal-label">Found in</div><div class="modal-value"><span class="region-tag ${p.region}">${regionLabel(p.region)}</span></div></div>
      <div class="modal-description">${p.description}</div>
    </div>`;
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

document.getElementById("modalClose").onclick = closeModal;
document.getElementById("modalOverlay").onclick = e => { if(e.target===document.getElementById("modalOverlay")) closeModal(); };
function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); document.body.style.overflow=""; }
document.addEventListener("keydown", e => { if(e.key==="Escape") closeModal(); });

document.querySelectorAll("[data-region]").forEach(btn => {
  btn.onclick = function() {
    document.querySelectorAll("[data-region]").forEach(b=>b.classList.remove("active"));
    this.classList.add("active"); activeRegion=this.dataset.region; render();
  };
});
document.querySelectorAll("[data-type]").forEach(btn => {
  btn.onclick = function() {
    document.querySelectorAll("[data-type]").forEach(b=>b.classList.remove("active"));
    this.classList.add("active"); activeType=this.dataset.type; render();
  };
});
document.querySelectorAll("[data-status]").forEach(btn => {
  btn.onclick = function() {
    document.querySelectorAll("[data-status]").forEach(b=>b.classList.remove("active"));
    this.classList.add("active"); activeStatus=this.dataset.status; render();
  };
});
document.getElementById("searchInput").oninput = function() { searchQuery=this.value.trim(); render(); };

render();
</script>
</body>
</html>
