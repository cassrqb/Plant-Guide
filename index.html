<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Study Guide — New England & Northeast</title>
<style>
  :root {
    --native: #2d7a3a;
    --invasive: #c0392b;
    --cultivated: #7d5ba6;
    --bg: #f5f3ee;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #666;
    --border: #e0ddd5;
    --accent: #3a6b35;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--accent); color: white; padding: 14px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  header h1 { font-size: 1.05rem; font-weight: 700; }
  header p { font-size: 0.72rem; opacity: 0.8; margin-top: 2px; }
  .controls { background: white; padding: 10px 14px; position: sticky; top: 60px; z-index: 99; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .search-box { display: flex; align-items: center; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 7px 11px; gap: 8px; }
  .search-box input { border: none; background: transparent; font-size: 0.92rem; width: 100%; outline: none; color: var(--text); }
  .search-box svg { flex-shrink: 0; opacity: 0.4; }
  .filter-row { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 1px; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); align-self: center; white-space: nowrap; min-width: 56px; }
  .filter-btn { white-space: nowrap; padding: 5px 11px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-size: 0.76rem; font-weight: 500; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .filter-btn.status-native.active { background: var(--native); border-color: var(--native); }
  .filter-btn.status-invasive.active { background: var(--invasive); border-color: var(--invasive); }
  .filter-btn.status-cultivated.active { background: var(--cultivated); border-color: var(--cultivated); }
  .count-bar { padding: 7px 14px; font-size: 0.76rem; color: var(--muted); }
  .grid { padding: 0 10px 28px; display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; }
  @media (max-width: 380px) { .grid { grid-template-columns: 1fr 1fr; } }
  .card { background: var(--card); border-radius: 13px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s; display: flex; flex-direction: column; }
  .card:active { transform: scale(0.97); }
  .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #e8e4dc; display: block; }
  .card-img-placeholder { width: 100%; aspect-ratio: 1; background: linear-gradient(135deg, #d4edda, #a8d5b5); display: none; align-items: center; justify-content: center; font-size: 2.4rem; }
  .card-body { padding: 9px; flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .card-common { font-size: 0.83rem; font-weight: 600; line-height: 1.2; }
  .card-scientific { font-size: 0.7rem; font-style: italic; color: var(--muted); }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
  .status-badge { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 0.62rem; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; align-self: flex-start; }
  .badge-native { background: #d4edda; color: var(--native); }
  .badge-invasive { background: #fde8e8; color: var(--invasive); }
  .badge-cultivated { background: #ede8f5; color: var(--cultivated); }
  .region-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-southshore { background: #3a6b35; }
  .dot-massachusetts { background: #1a5276; }
  .dot-northeast { background: #784212; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; padding: 20px 12px; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 20px 20px 14px 14px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch; animation: slideUp 0.22s ease-out; }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 20px 20px 0 0; background: #e8e4dc; display: block; }
  .modal-img-placeholder { width: 100%; aspect-ratio: 4/3; background: linear-gradient(135deg, #d4edda, #a8d5b5); display: none; align-items: center; justify-content: center; font-size: 5rem; border-radius: 20px 20px 0 0; }
  .modal-body { padding: 18px; }
  .modal-common { font-size: 1.25rem; font-weight: 700; line-height: 1.2; }
  .modal-also { font-size: 0.8rem; color: var(--muted); margin-top: 3px; }
  .modal-scientific { font-size: 0.92rem; font-style: italic; color: #555; margin-top: 5px; }
  .modal-divider { height: 1px; background: var(--border); margin: 13px 0; }
  .modal-row { display: flex; gap: 8px; margin-bottom: 9px; }
  .modal-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); min-width: 78px; padding-top: 1px; }
  .modal-value { font-size: 0.86rem; line-height: 1.4; }
  .modal-description { font-size: 0.86rem; line-height: 1.65; color: #444; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .modal-close { position: absolute; top: 30px; right: 22px; background: rgba(0,0,0,0.4); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .modal-wrapper { position: relative; }
  .region-tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
  .region-tag.southshore { background: #e8f5e9; color: #2d5a27; }
  .region-tag.massachusetts { background: #e8eef5; color: #1a4a6b; }
  .region-tag.northeast { background: #fdf3e7; color: #7a4010; }
  .no-results { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: 1/-1; }

  /* Legend */
  .legend { display: flex; gap: 12px; padding: 6px 14px 2px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.68rem; color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>🌿 Plant Study Guide</h1>
  <p>02171 Neighborhood · Massachusetts · Northeast US</p>
</header>

<div class="controls">

    <button class="filter-btn" data-bloom="11">Nov</button>
    <button class="filter-btn" data-bloom="12">Dec</button>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><span class="region-dot dot-southshore"></span> 02171 / South Shore</div>
  <div class="legend-item"><span class="region-dot dot-massachusetts"></span> Broader MA</div>
  <div class="legend-item"><span class="region-dot dot-northeast"></span> Northeast US</div>
</div>

<div class="count-bar" id="countBar"></div>
<div class="grid" id="plantGrid"></div>

  <div class="modal-wrapper">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal" id="modal"></div>

</div>

  { region:"southshore", common_names:["Black Swallow-wort"], scientific_name:"Cynanchum louiseae", plant_type:"vine", native_range:"Southwestern Europe", status_in_ma:"invasive", bloom_months:[6,7], description:"Twining herbaceous vine with small dark maroon-purple star-shaped flowers in summer and milkweed-like seed pods; aggressively invades disturbed areas, roadsides, and forest edges throughout MA.", emoji:"🌿" },
  { region:"southshore", common_names:["Common Dandelion"], scientific_name:"Taraxacum officinale", plant_type:"flowering", native_range:"Europe and Asia", status_in_ma:"cultivated", bloom_months:[3,4,5,6,7,8,9,10], description:"Familiar lawn weed with a rosette of toothed leaves, bright yellow composite flowers from spring through fall, and globe-shaped seed heads that disperse on the wind.", emoji:"🌼" },
  { region:"southshore", common_names:["Garlic Mustard"], scientific_name:"Alliaria petiolata", plant_type:"flowering", native_range:"Europe, western and central Asia", status_in_ma:"invasive", bloom_months:[4,5], description:"Biennial herb with triangular, scallop-edged leaves smelling of garlic when crushed and small white four-petaled flowers in April–May; aggressively invades woodland understories and edges.", emoji:"🌿" },
  { region:"southshore", common_names:["Japanese Knotweed","Fleece Flower","Mexican Bamboo"], scientific_name:"Reynoutria japonica", plant_type:"flowering", native_range:"East Asia", status_in_ma:"invasive", bloom_months:[8,9], description:"Extremely aggressive herbaceous perennial growing up to 10 feet tall with hollow bamboo-like stems, large shovel-shaped leaves, and sprays of small white flowers in late summer.", emoji:"🌿" },
  { region:"southshore", common_names:["Dame's Rocket","Dame's Violet","Sweet Rocket"], scientific_name:"Hesperis matronalis", plant_type:"flowering", native_range:"Europe and Asia", status_in_ma:"invasive", bloom_months:[5,6,7], description:"Tall biennial with fragrant pink, purple, or white four-petaled flowers from May through July; naturalized along roadsides and disturbed areas, often mistaken for native wild phlox.", emoji:"💜" },
  { region:"southshore", common_names:["Common Milkweed","Silkweed"], scientific_name:"Asclepias syriaca", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", bloom_months:[6,7], description:"Stout native perennial with large oval leaves and fragrant globular clusters of pink-purple flowers in July; the essential host plant for monarch butterfly caterpillars.", emoji:"🦋" },
  { region:"southshore", common_names:["Canada Goldenrod","Tall Goldenrod"], scientific_name:"Solidago canadensis", plant_type:"flowering", native_range:"North America", status_in_ma:"native", bloom_months:[8,9,10], description:"Common native perennial with arching plume-like clusters of tiny yellow flowers from August through October; a dominant wildflower of roadsides and old fields across the South Shore.", emoji:"🌼" },
  { region:"southshore", common_names:["New England Aster"], scientific_name:"Symphyotrichum novae-angliae", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", bloom_months:[8,9,10], description:"Tall native perennial producing masses of deep purple-to-lavender daisy-like flowers with yellow centers from late August through October; a vital late-season pollinator resource.", emoji:"💜" },
  { region:"southshore", common_names:["Orange Daylily","Tawny Daylily","Ditch Lily"], scientific_name:"Hemerocallis fulva", plant_type:"flowering", native_range:"East Asia", status_in_ma:"cultivated", bloom_months:[6,7], description:"Vigorous clump-forming perennial with strap-like leaves and large, tawny orange six-petaled flowers in June–July; naturalized along roadsides, railroad tracks, and suburban yards throughout MA.", emoji:"🌺" },
  { region:"southshore", common_names:["Black-eyed Susan"], scientific_name:"Rudbeckia hirta", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", bloom_months:[6,7,8,9], description:"Native biennial or short-lived perennial with bright yellow daisy-like flowers and dark brown-black cone centers blooming June through September; common in gardens, roadsides, and sunny disturbed areas.", emoji:"🌻" },
  { region:"southshore", common_names:["Orange Jewelweed","Spotted Touch-me-not"], scientific_name:"Impatiens capensis", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", bloom_months:[7,8,9], description:"Common native annual with succulent translucent stems and dangling spotted orange flowers from July through September; found in moist shade along streams and wooded edges throughout the South Shore.", emoji:"🌿" },
  { region:"southshore", common_names:["White Clover"], scientific_name:"Trifolium repens", plant_type:"flowering", native_range:"Europe and Central Asia", status_in_ma:"cultivated", bloom_months:[5,6,7,8,9], description:"Low creeping perennial with three-part leaves often bearing white chevron markings and spherical white flower heads; ubiquitous in lawns, roadsides, and disturbed areas.", emoji:"🍀" },
  { region:"southshore", common_names:["Common Burdock","Lesser Burdock"], scientific_name:"Arctium minus", plant_type:"flowering", native_range:"Europe", status_in_ma:"cultivated", bloom_months:[7,8,9], description:"Large biennial with enormous rhubarb-like basal leaves and round, hooked burrs in late summer that cling tenaciously to clothing and animal fur; common along woodland edges and disturbed areas.", emoji:"🌿" },
  { region:"southshore", common_names:["St. John's Wort","Common St. John's Wort"], scientific_name:"Hypericum perforatum", plant_type:"flowering", native_range:"Europe and Asia", status_in_ma:"cultivated", bloom_months:[6,7,8], description:"Erect perennial herb with small oval leaves dotted with translucent oil glands and clusters of bright yellow five-petaled flowers from June through August; naturalized in dry, open areas and roadsides.", emoji:"🌼" },
  { region:"southshore", common_names:["Purple Loosestrife"], scientific_name:"Lythrum salicaria", plant_type:"flowering", native_range:"Europe and Asia", status_in_ma:"invasive", bloom_months:[7,8,9], description:"Tall perennial herb forming dense monocultures in wetlands, with showy spikes of magenta-purple flowers from July through September; one of the most damaging wetland invasives in MA.", emoji:"💜" },
  { region:"southshore", common_names:["Bishop's Goutweed","Ground Elder","Goutweed"], scientific_name:"Aegopodium podagraria", plant_type:"groundcover", native_range:"Europe and Asia", status_in_ma:"invasive", bloom_months:[5,6], description:"Aggressive spreading groundcover with compound leaves (variegated white-and-green in cultivated forms) and flat-topped white flower clusters in June; spreads by rhizomes and escapes gardens into disturbed areas.", emoji:"🌱" },
  { region:"southshore", common_names:["Japanese Spurge","Pachysandra"], scientific_name:"Pachysandra terminalis", plant_type:"groundcover", native_range:"Japan and China", status_in_ma:"cultivated", bloom_months:[4,5], description:"Evergreen low-growing groundcover with glossy, toothed leaves and small white flower spikes in early spring; planted under trees in nearly every suburban New England yard.", emoji:"🌱" },
  { region:"southshore", common_names:["Periwinkle","Common Periwinkle","Myrtle"], scientific_name:"Vinca minor", plant_type:"groundcover", native_range:"Central and Southern Europe", status_in_ma:"cultivated", bloom_months:[4,5], description:"Trailing evergreen groundcover with small glossy leaves and solitary blue-violet five-petaled flowers in spring; planted under trees and on slopes, can escape into woodland areas.", emoji:"🌸" },
  { region:"southshore", common_names:["Partridgeberry","Twinberry"], scientific_name:"Mitchella repens", plant_type:"groundcover", native_range:"Eastern North America", status_in_ma:"native", bloom_months:[6,7], description:"Low native evergreen mat-forming plant with small paired glossy leaves, twin white tubular flowers in summer, and bright red paired berries that persist into winter on shaded woodland floors.", emoji:"🔴" },
  { region:"southshore", common_names:["Wintergreen","Checkerberry","Teaberry"], scientific_name:"Gaultheria procumbens", plant_type:"groundcover", native_range:"Eastern North America", status_in_ma:"native", bloom_months:[7,8], description:"Low native evergreen groundcover with small shiny leathery leaves that smell of wintergreen when crushed and small red berry-like fruits persisting through winter under acidic woodland canopy.", emoji:"🌱" },
  { region:"southshore", common_names:["Common Reed","Phragmites"], scientific_name:"Phragmites australis", plant_type:"grass", native_range:"Eurasia (invasive haplotype)", status_in_ma:"invasive", bloom_months:[8,9], description:"Extremely tall perennial grass (up to 15 feet) with fluffy tan-brown plumes in fall; forms dense impenetrable monocultures in coastal wetlands and ditches, crowding out native marsh plants.", emoji:"🌾" },
  { region:"southshore", common_names:["Red Fescue","Creeping Red Fescue"], scientific_name:"Festuca rubra", plant_type:"grass", native_range:"Europe and temperate North America", status_in_ma:"cultivated", bloom_months:[5,6], description:"Fine-bladed, cool-season lawn grass with narrow bright green leaves; widely used in lawn seed mixes for shaded, dry, or coastal conditions throughout New England.", emoji:"🌾" },
  { region:"southshore", common_names:["Large Crabgrass","Hairy Crabgrass"], scientific_name:"Digitaria sanguinalis", plant_type:"grass", native_range:"Europe and Asia", status_in_ma:"cultivated", bloom_months:[7,8,9], description:"Annual summer grass that germinates in warm weather and spreads as a low mat with finger-like seed spikes; a ubiquitous lawn weed in driveways, sidewalk cracks, and thin turf areas.", emoji:"🌾" },
  { region:"southshore", common_names:["Marginal Wood Fern","Leather Wood Fern"], scientific_name:"Dryopteris marginalis", plant_type:"fern", native_range:"Eastern North America", status_in_ma:"native", bloom_months:[], description:"Native evergreen fern with leathery, dark green fronds that remain green through winter; one of the most common ferns on wooded suburban hillsides and woodland edges in eastern MA.", emoji:"🌿" },
  { region:"southshore", common_names:["Cinnamon Fern"], scientific_name:"Osmundastrum cinnamomeum", plant_type:"fern", native_range:"Eastern North America and East Asia", status_in_ma:"native", bloom_months:[], description:"Large native fern with distinctive separate cinnamon-brown fertile fronds rising from the center of a vase-shaped clump of green sterile fronds; common in moist woods and wetland edges.", emoji:"🌿" },

  // ── SOUTH SHORE — ADDITIONAL ─────────────────────────────────────────────

  { region:"southshore", common_names:["Crabapple","Flowering Crabapple"], scientific_name:"Malus sylvestris", plant_type:"tree", native_range:"Europe (cultivated forms widespread)", status_in_ma:"cultivated", bloom_months:[4,5], description:"Small ornamental tree with clouds of pink or white flowers in May and small tart red or yellow fruits in fall; countless cultivars planted in suburban yards and along streets throughout Quincy.", emoji:"🌸" },

  { region:"southshore", common_names:["American Elm"], scientific_name:"Ulmus americana", plant_type:"tree", native_range:"Eastern North America", status_in_ma:"native", bloom_months:[3,4], description:"Graceful vase-shaped tree that once lined nearly every New England street; decimated by Dutch elm disease but disease-resistant cultivars are being replanted in Quincy and surrounding communities.", emoji:"🌳" },
  { region:"southshore", common_names:["White Mulberry"], scientific_name:"Morus alba", plant_type:"tree", native_range:"China", status_in_ma:"invasive", bloom_months:[4,5], description:"Fast-growing tree with variable leaf shapes and abundant small white to pinkish edible berries in early summer; introduced for silkworm cultivation, now naturalized in disturbed areas and urban lots throughout eastern MA.", emoji:"🌳" },
  { region:"southshore", common_names:["Ginkgo","Maidenhair Tree"], scientific_name:"Ginkgo biloba", plant_type:"tree", native_range:"China", status_in_ma:"cultivated", bloom_months:[4,5], description:"Ancient living fossil with distinctive fan-shaped leaves that turn brilliant gold in fall; widely planted as a street tree for its pollution tolerance and striking autumn color in Quincy and Boston suburbs.", emoji:"🌳" },
  { region:"southshore", common_names:["American Holly"], scientific_name:"Ilex opaca", plant_type:"tree", native_range:"Eastern North America", status_in_ma:"native", bloom_months:[5,6], description:"Native evergreen tree with spiny dark-green leaves and bright red berries that persist through winter; at the northern edge of its natural range in MA, but planted in South Shore yards and naturalized in some coastal areas.", emoji:"🌲" },
  { region:"southshore", common_names:["Japanese Spirea","Japanese Meadowsweet"], scientific_name:"Spiraea japonica", plant_type:"shrub", native_range:"Japan and China", status_in_ma:"invasive", bloom_months:[6,7], description:"Low mounding shrub with flat-topped clusters of tiny pink or white flowers in early summer; widely planted as a landscape shrub but escaping roadsides and forest edges in eastern Massachusetts.", emoji:"🌸" },
  { region:"southshore", common_names:["Butterfly Bush"], scientific_name:"Buddleja davidii", plant_type:"shrub", native_range:"China and Japan", status_in_ma:"cultivated", bloom_months:[7,8,9], description:"Fast-growing shrub with long arching spikes of fragrant purple, pink, or white flowers from midsummer into fall; planted for its appeal to butterflies but considered invasive in some regions and seeds freely in disturbed areas.", emoji:"🦋" },
  { region:"southshore", common_names:["Oxeye Daisy","Moon Daisy"], scientific_name:"Leucanthemum vulgare", plant_type:"flowering", native_range:"Europe and Asia", status_in_ma:"invasive", bloom_months:[5,6,7], description:"Familiar roadside wildflower with large white daisy flowers with bright yellow centers blooming from late May through July; naturalized in old fields, roadsides, and disturbed areas throughout eastern Massachusetts.", emoji:"🌼" },

  { region:"southshore", common_names:["Common Yarrow","Milfoil"], scientific_name:"Achillea millefolium", plant_type:"flowering", native_range:"Europe and Asia (naturalized in North America)", status_in_ma:"cultivated", bloom_months:[5,6,7,8,9], description:"Aromatic perennial with feathery finely-divided leaves and flat-topped clusters of small white or occasionally pink flowers; extremely common in lawns, roadsides, and open areas throughout the South Shore.", emoji:"🌼" },
  { region:"southshore", common_names:["Bee Balm","Oswego Tea","Scarlet Monarda"], scientific_name:"Monarda didyma", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", bloom_months:[6,7,8], description:"Showy native perennial with ragged-looking scarlet flower heads on tall stems from late June through August; a magnet for hummingbirds and bumblebees, widely planted in gardens and naturalized along stream edges.", emoji:"🌺" },
  { region:"southshore", common_names:["Common Mullein","Flannel Leaf","Woolly Mullein"], scientific_name:"Verbascum thapsus", plant_type:"flowering", native_range:"Europe and Asia", status_in_ma:"invasive", bloom_months:[6,7,8], description:"Tall biennial forming a basal rosette of huge velvety gray-green leaves in year one and a towering spike of yellow flowers up to 6 feet tall in year two; colonizes roadsides, gravel, and disturbed areas throughout eastern MA.", emoji:"🌿" },
  { region:"southshore", common_names:["Common Evening Primrose"], scientific_name:"Oenothera biennis", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", bloom_months:[6,7,8,9], description:"Native biennial with large lemon-yellow four-petaled flowers that open in late afternoon and close by morning, filling the air with fragrance; common in roadsides, fields, and sandy disturbed areas throughout the South Shore.", emoji:"🌼" },
  { region:"southshore", common_names:["Common Boneset","Thoroughwort"], scientific_name:"Eupatorium perfoliatum", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", bloom_months:[7,8,9], description:"Native perennial distinctive for its paired leaves that appear to be pierced by the stem, topped with flat clusters of fuzzy white flowers in late summer; common in wet meadows, stream banks, and marsh edges.", emoji:"🌿" },

  { region:"southshore", common_names:["Tall Buttercup","Common Buttercup"], scientific_name:"Ranunculus acris", plant_type:"flowering", native_range:"Europe and Asia", status_in_ma:"invasive", bloom_months:[5,6,7], description:"Upright perennial with deeply divided leaves and cheerful glossy bright yellow five-petaled flowers from May through July; naturalized in lawns, meadows, and roadsides throughout suburban Massachusetts.", emoji:"🌼" },

  { region:"southshore", common_names:["Creeping Jenny","Moneywort"], scientific_name:"Lysimachia nummularia", plant_type:"groundcover", native_range:"Europe", status_in_ma:"invasive", bloom_months:[5,6,7], description:"Low creeping plant with round paired leaves and bright yellow cup-shaped flowers in early summer; escapes from gardens into moist roadsides, ditches, and stream banks throughout eastern Massachusetts.", emoji:"🌱" },

  { region:"southshore", common_names:["Lady Fern"], scientific_name:"Athyrium filix-femina", plant_type:"fern", native_range:"Circumboreal", status_in_ma:"native", bloom_months:[], description:"Graceful, bright yellow-green fern with lacy, finely divided fronds that arch outward; extremely common in moist shaded areas, stream banks, and wooded edges throughout the South Shore, dying back completely in winter.", emoji:"🌿" },
  { region:"southshore", common_names:["Broadleaf Plantain","Common Plantain"], scientific_name:"Plantago major", plant_type:"flowering", native_range:"Europe and Asia", status_in_ma:"cultivated", bloom_months:[5,6,7,8,9], description:"Ubiquitous lawn weed with broad oval ribbed leaves pressed flat to the ground and slim greenish flower spikes; found in every lawn, pathway, and compacted soil area throughout Quincy and the South Shore.", emoji:"🌿" },
  { region:"southshore", common_names:["Big Bluestem","Turkeyfoot"], scientific_name:"Andropogon gerardii", plant_type:"grass", native_range:"North America", status_in_ma:"native", bloom_months:[7,8,9], description:"Tall native prairie grass reaching 6 feet with distinctive three-pronged seed heads resembling a turkey's foot; native to MA's dry sandy areas and planted increasingly in native gardens and restored meadows.", emoji:"🌾" },
  { region:"southshore", common_names:["Kentucky Bluegrass","June Grass"], scientific_name:"Poa pratensis", plant_type:"grass", native_range:"Europe and northern Asia", status_in_ma:"cultivated", bloom_months:[5,6], description:"The dominant cool-season lawn grass throughout New England; forms dense fine-textured turf that turns lush green in spring and fall but may go dormant in summer drought. Found in virtually every lawn on the South Shore.", emoji:"🌾" },

  { region:"massachusetts", common_names:["Saltmarsh Cordgrass","Smooth Cordgrass","Spartina"], scientific_name:"Spartina alterniflora", plant_type:"grass", native_range:"Atlantic and Gulf coasts of North America", status_in_ma:"native", bloom_months:[7,8], description:"The dominant grass of intertidal salt marshes, forming tall dense stands of bright green in summer that turn golden-brown in fall; defines the iconic tidal marsh landscapes throughout the MA coast.", emoji:"🌾" },

  { region:"massachusetts", common_names:["Cranberry","American Cranberry","Bog Cranberry"], scientific_name:"Vaccinium macrocarpon", plant_type:"groundcover", native_range:"Eastern North America", status_in_ma:"native", bloom_months:[6,7], description:"Low trailing evergreen vine with tiny leathery leaves, delicate pink reflexed flowers, and iconic bright red berries; native to acidic bogs across MA and famously cultivated in flooded cranberry bogs on Cape Cod and Plymouth County.", emoji:"🔴" },
  { region:"massachusetts", common_names:["Round-leaved Sundew","Sundew"], scientific_name:"Drosera rotundifolia", plant_type:"flowering", native_range:"Circumboreal", status_in_ma:"native", bloom_months:[6,7,8], description:"Tiny carnivorous plant forming rosettes of round reddish leaves covered in sticky glistening tentacles that trap insects; found in the acidic sphagnum bogs of Cape Cod, southeastern MA, and the central highlands.", emoji:"🌿" },

  { region:"northeast", common_names:["Turk's Cap Lily"], scientific_name:"Lilium superbum", plant_type:"flowering", native_range:"Eastern North America", status_in_ma:"native", bloom_months:[7,8], description:"Towering native lily reaching 8 feet tall with whorled leaves and spectacular nodding orange flowers with swept-back spotted petals in July and August; found in moist meadows, stream banks, and forest edges, particularly showy in the mid-Atlantic states.", emoji:"🧡" },

  { region:"northeast", common_names:["Eastern Redbud","Redbud","Judas Tree"], scientific_name:"Cercis canadensis", plant_type:"tree", native_range:"Eastern North America", status_in_ma:"native", bloom_months:[4], description:"Small understory tree that erupts in magenta-pink flower clusters directly from its bare branches and trunk in April before any leaves appear; one of the most spectacular spring displays in mid-Atlantic forests and roadsides, native to Pennsylvania south but not reaching Massachusetts naturally.", emoji:"🌸" },

// Cache of scientific_name -> image URL fetched from Wikipedia
const imgCache = {};

function fetchWikiImg(scientificName, imgEl, placeholderEl) {
  if (imgCache[scientificName]) {
    const url = imgCache[scientificName];
    if (url) { imgEl.src = url; imgEl.style.display = "block"; placeholderEl.style.display = "none"; }
    return;
  }
  const title = scientificName.replace(/ /g, '_');
  fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`)
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      const url = data?.originalimage?.source || data?.thumbnail?.source || null;
      imgCache[scientificName] = url || "";
      if (url) { imgEl.src = url; imgEl.style.display = "block"; placeholderEl.style.display = "none"; }
    })
    .catch(() => { imgCache[scientificName] = ""; });
}

// IntersectionObserver: fetch image only when card enters viewport
const imgObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const el = entry.target;
      const name = el.dataset.sciname;
      const imgEl = el.querySelector(".card-img");
      const placeholderEl = el.querySelector(".card-img-placeholder");
      if (name && imgEl && placeholderEl) fetchWikiImg(name, imgEl, placeholderEl);
      imgObserver.unobserve(el);
    }
  });
}, { rootMargin: "200px" });
function badgeClass(s) { return s==="native"?"badge-native":s==="invasive"?"badge-invasive":"badge-cultivated"; }
function badgeLabel(s) { return s==="native"?"Native":s==="invasive"?"Invasive":"Cultivated"; }
function regionLabel(r) { return r==="southshore"?"02171 / South Shore":r==="massachusetts"?"Broader MA":"Northeast US"; }

const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function bloomLabel(months) {
  if (!months || !months.length) return "—";
  return months.map(m => MONTH_NAMES[m-1]).join(", ");
}
let activeRegion="all", activeType="all", activeStatus="all", activeBloom=null, searchQuery="";

// Region filter is cumulative: "southshore" shows only southshore; "massachusetts" shows southshore+massachusetts; "northeast" shows all
const REGION_INCLUDES = {
  all: ["southshore","massachusetts","northeast"],
  southshore: ["southshore"],
  massachusetts: ["southshore","massachusetts"],
  northeast: ["southshore","massachusetts","northeast"]
};

function matches(p) {
  if (!REGION_INCLUDES[activeRegion].includes(p.region)) return false;
  if (activeType !== "all" && p.plant_type !== activeType) return false;
  if (activeStatus !== "all" && p.status_in_ma !== activeStatus) return false;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    if (!p.common_names.some(n=>n.toLowerCase().includes(q)) && !p.scientific_name.toLowerCase().includes(q)) return false;
  }
  if (activeBloom !== null && !(p.bloom_months||[]).includes(activeBloom)) return false;
  return true;
}

function render() {
  const grid = document.getElementById("plantGrid");
  const filtered = PLANTS.filter(matches);
  document.getElementById("countBar").textContent = `${filtered.length} plant${filtered.length!==1?"s":""}`;
  if (!filtered.length) { grid.innerHTML=`<div class="no-results"><div style="font-size:2.5rem">🔍</div><p>No plants match your filters.</p></div>`; return; }
  grid.innerHTML = filtered.map(p => {
    const idx = PLANTS.indexOf(p);
    return `<div class="card" onclick="openModal(${idx})" data-sciname="${p.scientific_name}">
      <img class="card-img" alt="${p.common_names[0]}" style="display:none">
      <div class="card-img-placeholder" style="display:flex">${p.emoji}</div>
      <div class="card-body">
        <div class="card-common">${p.common_names[0]}</div>
        <div class="card-scientific">${p.scientific_name}</div>
        <div class="card-footer">
          <span class="status-badge ${badgeClass(p.status_in_ma)}">${badgeLabel(p.status_in_ma)}</span>
          <span class="region-dot dot-${p.region}" title="${regionLabel(p.region)}"></span>
        </div>
      </div>
    </div>`;
  }).join("");
  // Observe each card for lazy image loading
  grid.querySelectorAll(".card[data-sciname]").forEach(card => imgObserver.observe(card));
}

function openModal(idx) {
  const p = PLANTS[idx];
  const modal = document.getElementById("modal");
  const altNames = p.common_names.slice(1);
  modal.innerHTML = `
    <img class="modal-img" alt="${p.common_names[0]}" style="display:none">
    <div class="modal-img-placeholder" style="display:flex">${p.emoji}</div>
    <div class="modal-body">
      <div class="modal-common">${p.common_names[0]}</div>
      ${altNames.length?`<div class="modal-also">Also: ${altNames.join(", ")}</div>`:""}
      <div class="modal-scientific">${p.scientific_name}</div>
      <div class="modal-divider"></div>
      <div class="modal-row"><div class="modal-label">Type</div><div class="modal-value" style="text-transform:capitalize">${p.plant_type==="flowering"?"Flowering Plant":p.plant_type}</div></div>
      <div class="modal-row"><div class="modal-label">Origin</div><div class="modal-value"><span class="status-badge ${badgeClass(p.status_in_ma)}">${badgeLabel(p.status_in_ma)}</span></div></div>
      <div class="modal-row"><div class="modal-label">Native to</div><div class="modal-value">${p.native_range}</div></div>
      <div class="modal-row"><div class="modal-label">Found in</div><div class="modal-value"><span class="region-tag ${p.region}">${regionLabel(p.region)}</span></div></div>
      <div class="modal-row"><div class="modal-label">Blooms</div><div class="modal-value">${bloomLabel(p.bloom_months)}</div></div>
      <div class="modal-description">${p.description}</div>
    </div>`;
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
  // Load full-size image for modal
  const mImg = modal.querySelector(".modal-img");
  const mPh = modal.querySelector(".modal-img-placeholder");
  if (mImg && mPh) fetchWikiImg(p.scientific_name, mImg, mPh);
}

document.getElementById("modalClose").onclick = closeModal;
document.getElementById("modalOverlay").onclick = e => { if(e.target===document.getElementById("modalOverlay")) closeModal(); };
function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); document.body.style.overflow=""; }
document.addEventListener("keydown", e => { if(e.key==="Escape") closeModal(); });

document.querySelectorAll("[data-region]").forEach(btn => {
  btn.onclick = function() {
    document.querySelectorAll("[data-region]").forEach(b=>b.classList.remove("active"));
    this.classList.add("active"); activeRegion=this.dataset.region; render();
  };
});
document.querySelectorAll("[data-type]").forEach(btn => {
  btn.onclick = function() {
    document.querySelectorAll("[data-type]").forEach(b=>b.classList.remove("active"));
    this.classList.add("active"); activeType=this.dataset.type; render();
  };
});
document.querySelectorAll("[data-status]").forEach(btn => {
  btn.onclick = function() {
    document.querySelectorAll("[data-status]").forEach(b=>b.classList.remove("active"));
    this.classList.add("active"); activeStatus=this.dataset.status; render();
  };
});
document.getElementById("searchInput").oninput = function() { searchQuery=this.value.trim(); render(); };

function setBloom(month) {
  activeBloom = (activeBloom === month) ? null : month;
  document.querySelectorAll("[data-bloom], #bloomNow").forEach(b => b.classList.remove("active"));
  if (activeBloom !== null) {
    const btn = document.querySelector(`[data-bloom="${activeBloom}"]`) || (activeBloom === new Date().getMonth()+1 ? document.getElementById("bloomNow") : null);
    if (btn) btn.classList.add("active");
  }
  render();
}
document.querySelectorAll("[data-bloom]").forEach(btn => {
  btn.onclick = function() { setBloom(parseInt(this.dataset.bloom)); };
});
document.getElementById("bloomNow").onclick = function() {
  const month = new Date().getMonth() + 1;
  activeBloom = (activeBloom === month) ? null : month;
  document.querySelectorAll("[data-bloom], #bloomNow").forEach(b => b.classList.remove("active"));
  if (activeBloom !== null) this.classList.add("active");
  render();
};

render();
</script>
